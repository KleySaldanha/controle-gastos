<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Controle de Gastos</title>
  <script type="module" src="/js/login.js"></script>
</head>
<body class="auth-body">

<div class="auth-card">
  <div class="auth-logo">💰</div>
  <h1 class="auth-title">Controle de Gastos</h1>
  <p class="auth-subtitle">Entre na sua conta</p>

  <form id="login-form" class="auth-form" novalidate>
    <div class="field">
      <label for="login-email">E-mail</label>
      <input type="email" id="login-email" placeholder="seu@email.com" required autocomplete="email">
    </div>
    <div class="field">
      <label for="login-password">Senha</label>
      <input type="password" id="login-password" placeholder="••••••" required autocomplete="current-password">
    </div>

    <p class="auth-error" id="login-error"></p>

    <button type="submit" id="login-btn" class="btn btn-primary auth-btn">Entrar</button>
  </form>

  <p class="auth-link">
    Não tem conta?
    <a href="register.html">Cadastre-se</a>
  </p>
</div>

</body>
</html>
