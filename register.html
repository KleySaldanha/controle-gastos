<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro — Controle de Gastos</title>
  <script type="module" src="/js/register.js"></script>
</head>
<body class="auth-body">

<div class="auth-card">
  <div class="auth-logo">💰</div>
  <h1 class="auth-title">Controle de Gastos</h1>
  <p class="auth-subtitle">Crie sua conta</p>

  <form id="register-form" class="auth-form" novalidate>
    <div class="field">
      <label for="reg-name">Nome</label>
      <input type="text" id="reg-name" placeholder="Seu nome" required autocomplete="name">
    </div>
    <div class="field">
      <label for="reg-email">E-mail</label>
      <input type="email" id="reg-email" placeholder="seu@email.com" required autocomplete="email">
    </div>
    <div class="field">
      <label for="reg-password">Senha</label>
      <input type="password" id="reg-password" placeholder="Mínimo 6 caracteres" required autocomplete="new-password">
    </div>
    <div class="field">
      <label for="reg-confirm">Confirmar senha</label>
      <input type="password" id="reg-confirm" placeholder="Repita a senha" required autocomplete="new-password">
    </div>

    <p class="auth-error" id="register-error"></p>

    <button type="submit" id="register-btn" class="btn btn-primary auth-btn">Cadastrar</button>
  </form>

  <p class="auth-link">
    Já tem conta? <a href="login.html">Entrar</a>
  </p>
</div>

</body>
</html>
