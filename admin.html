<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Usuários — Controle de Gastos</title>
  <script type="module" src="/js/admin.js"></script>
</head>
<body class="admin-body">

<div class="admin-page">

  <header class="admin-header">
    <div class="admin-header-left">
      <a href="index.html" class="back-link">← Voltar</a>
      <span class="auth-logo" style="font-size:22px">💰</span>
      <span class="admin-title">Controle de Usuários</span>
    </div>
    <div class="admin-header-right">
      <span id="admin-name" class="user-name"></span>
      <span class="role-badge admin">Admin</span>
      <button id="logout-btn" class="btn">Sair</button>
    </div>
  </header>

  <main class="admin-main">

    <div class="admin-toolbar">
      <h2 class="admin-section-title">Usuários cadastrados</h2>
      <div class="admin-toolbar-right">
        <span id="users-count" class="users-count"></span>
        <button id="refresh-btn" class="btn">↻ Atualizar</button>
      </div>
    </div>

    <div class="table-wrap">
      <table class="admin-table">
        <thead>
          <tr>
            <th>Usuário</th>
            <th>Perfil</th>
            <th>Status</th>
            <th>Cadastro</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody id="users-tbody">
          <tr><td colspan="5" class="table-loading">Carregando...</td></tr>
        </tbody>
      </table>
    </div>

  </main>
</div>

</body>
</html>
