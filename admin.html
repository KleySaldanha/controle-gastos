<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Usuários — Controle de Gastos</title>
  <script type="module" src="/js/admin.js"></script>
</head>
<body class="admin-body">

<div class="admin-page">

  <header class="admin-header">
    <div class="admin-header-left">
      <a href="index.html" class="back-link">← Voltar</a>
      <span class="auth-logo" style="font-size:22px">💰</span>
      <span class="admin-title">Controle de Usuários</span>
    </div>
    <div class="admin-header-right">
      <span id="admin-name" class="user-name"></span>
      <span class="role-badge admin">Admin</span>
      <button id="logout-btn" class="btn">Sair</button>
    </div>
  </header>

  <main class="admin-main">

    <div class="admin-toolbar">
      <h2 class="admin-section-title">Usuários cadastrados</h2>
      <div class="admin-toolbar-right">
        <span id="users-count" class="users-count"></span>
        <button id="refresh-btn" class="btn">↻ Atualizar</button>
      </div>
    </div>

    <div class="table-wrap">
      <table class="admin-table">
        <thead>
          <tr>
            <th>Usuário</th>
            <th>Perfil</th>
            <th>Status</th>
            <th>Cadastro</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody id="users-tbody">
          <tr><td colspan="5" class="table-loading">Carregando...</td></tr>
        </tbody>
      </table>
    </div>

  </main>
</div>

<!-- Modal de edição de usuário -->
<div class="modal-overlay" id="edit-modal" role="dialog" aria-modal="true" aria-label="Editar usuário">
  <div class="modal" style="max-width:420px">
    <div class="modal-header">
      <span class="modal-title">Editar usuário</span>
      <button class="modal-close" onclick="closeEditModal()" aria-label="Fechar">×</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="edit-uid">
      <p class="edit-email-label">
        <span style="font-size:12px;color:var(--text-2)">E-mail:</span>
        <span id="edit-email-info" style="font-size:13px;font-weight:500"></span>
      </p>

      <form id="edit-name-form" class="auth-form" novalidate style="gap:10px">
        <div class="field">
          <label for="edit-name">Nome</label>
          <input type="text" id="edit-name" placeholder="Nome do usuário" required>
        </div>
        <button type="submit" class="btn btn-primary">Salvar nome</button>
      </form>

      <hr class="profile-divider" style="margin:16px 0">

      <div>
        <p style="font-size:13px;color:var(--text-2);margin:0 0 10px">
          Para alterar a senha, envie um e-mail de redefinição ao usuário.
        </p>
        <button id="send-reset-btn" class="btn" style="width:100%">
          Enviar redefinição de senha
        </button>
      </div>

      <p id="edit-msg" class="auth-error" style="margin-top:10px"></p>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeEditModal()">Fechar</button>
    </div>
  </div>
</div>

</body>
</html>
